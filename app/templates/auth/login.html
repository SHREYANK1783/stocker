{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const card = document.querySelector('.card');
        if (card) {
            card.classList.add('fade-in');
        }
    });
</script>

<div class="card">
    <h2>Log In</h2>
    <form method="post">
        <label for="email">Email</label>
        <input name="email" id="email" type="email" required>

        <label for="password">Password</label>
        <input name="password" id="password" type="password" required>

        <button type="submit" style="margin-bottom: 1rem;">Log In</button>
        <a href="{{ url_for('google.login') }}"
            style="display: inline-block; text-align: center; padding: 0.5rem 1rem; background-color: #db4437; color: white; text-decoration: none; border-radius: 4px; font-weight: 500;">
            Log In with Google
        </a>
    </form>
    <div style="margin-top: 1rem; text-align: center; font-size: 0.875rem;">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
    </div>
</div>
{% endblock %}
